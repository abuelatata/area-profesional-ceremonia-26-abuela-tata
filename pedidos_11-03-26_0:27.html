<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Pedidos · Abuela Tata</title>

<link rel="icon" href="./assets/favicon.png">

<style>
:root{
  --bg:#f5efe6;
  --ink:#5f4636;
  --line:#e6d6c6;
  --accent:#7fb9b3;
  --shadow:0 8px 20px rgba(60,40,25,.10);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  background:var(--bg);
  height:100vh;
  overflow:hidden;
  color:var(--ink);
}

/* Barra superior */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:62px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0 16px;
  background:rgba(255,255,255,.85);
  backdrop-filter: blur(8px);
  border-bottom:1px solid var(--line);
  z-index:100;
}

.brand{
  font-weight:800;
  letter-spacing:.3px;
  font-size:15px;
  text-align:right;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:9px 14px;
  border-radius:14px;
  border:1px solid rgba(127,185,179,.55);
  background:rgba(127,185,179,.18);
  color:var(--ink);
  text-decoration:none;
  font-size:14px;
  transition:.15s;
  flex:0 0 auto;
}

.btn:hover{
  background:rgba(127,185,179,.25);
}

iframe{
  position:fixed;
  top:62px;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  height:calc(100vh - 62px);
  border:0;
  background:#fff;
}

@media (max-width:700px){
  .topbar{
    padding:0 10px;
    gap:8px;
  }

  .btn{
    padding:8px 12px;
    font-size:13px;
  }

  .brand{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <a class="btn" href="./index.html">← Volver al Área Profesional</a>
  <div class="brand" id="brandText">App de Pedidos · Comunión 2026</div>
</div>

<iframe
  id="appFrame"
  src="https://abuelatata.github.io/repeticiones-ceremonia-26/"
  title="Pedidos Abuela Tata">
</iframe>

<script>
(function () {
  const frame = document.getElementById("appFrame");
  const brandText = document.getElementById("brandText");

  const params = new URLSearchParams(window.location.search);
  const modo = (params.get("modo") || "").toLowerCase().trim();

  const baseUrl = "https://abuelatata.github.io/repeticiones-ceremonia-26/";
  const allowedModos = ["repeticiones", "stock", "excedentes"];

  function buildIframeUrl() {
    const url = new URL(baseUrl);

    if (allowedModos.includes(modo)) {
      url.searchParams.set("modo", modo);
    }

    return url.toString();
  }

  function getBrandLabel() {
    if (modo === "stock") return "Stock disponible · Comunión 2026";
    if (modo === "excedentes") return "Excedentes · Comunión 2026";
    if (modo === "repeticiones") return "Repeticiones · Comunión 2026";
    return "App de Pedidos · Comunión 2026";
  }

  frame.src = buildIframeUrl();
  brandText.textContent = getBrandLabel();
  document.title = getBrandLabel() + " · Abuela Tata";
})();
</script>

</body>
</html>
