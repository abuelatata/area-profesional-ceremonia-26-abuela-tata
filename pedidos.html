<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Pedidos · Abuela Tata</title>

<link rel="icon" href="./assets/favicon.png">

<style>

:root{
  --bg:#f5efe6;
  --ink:#5f4636;
  --line:#e6d6c6;
  --accent:#7fb9b3;
  --shadow:0 8px 20px rgba(60,40,25,.10);
  --topbar-h:62px;
}

*,
*::before,
*::after{
box-sizing:border-box;
}

html{
width:100%;
overflow-x:hidden;
}

body{
margin:0;
width:100%;
min-height:100vh;
font-family: ui-serif, Georgia, "Times New Roman", serif;
background:var(--bg);
color:var(--ink);

overflow-x:hidden;
overflow-y:auto;

-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility;
}

/* BARRA SUPERIOR */

.topbar{
position:fixed;
top:0;
left:0;
right:0;

height:var(--topbar-h);

display:flex;
align-items:center;
justify-content:space-between;
gap:12px;

padding:0 16px;

background:rgba(255,255,255,.92);
backdrop-filter: blur(10px);

border-bottom:1px solid var(--line);

z-index:100;
}

.brand{
font-weight:800;
letter-spacing:.3px;
font-size:15px;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

min-width:0;
flex:1;
text-align:right;
}

.btn{
display:inline-flex;
align-items:center;
gap:6px;

padding:9px 14px;

border-radius:14px;

border:1px solid rgba(127,185,179,.55);

background:rgba(127,185,179,.18);

color:var(--ink);

text-decoration:none;
font-size:14px;

transition:.15s;

flex:0 0 auto;

box-shadow:0 2px 8px rgba(60,40,25,.04);
}

.btn:hover{
background:rgba(127,185,179,.25);
}

/* IFRAME APP */

iframe{
position:fixed;

top:var(--topbar-h);
left:0;
right:0;
bottom:0;

width:100%;
height:calc(100dvh - var(--topbar-h));

border:0;
background:#fff;

overflow:hidden;
}

/* TABLET */

@media (max-width:900px){

:root{
--topbar-h:58px;
}

.topbar{
padding:0 12px;
gap:8px;
}

.brand{
font-size:14px;
}

.btn{
padding:8px 12px;
font-size:13px;
border-radius:12px;
}

}

/* MÓVIL */

@media (max-width:600px){

:root{
--topbar-h:54px;
}

.topbar{
padding:0 10px;
gap:8px;
}

.brand{
font-size:13px;
}

.btn{
padding:7px 10px;
font-size:12px;
border-radius:10px;
}

}

</style>
</head>

<body>

<div class="topbar">

<a class="btn" href="./index.html">
← Área profesional
</a>

<div class="brand" id="brandText">
App de Pedidos · Comunión 2026
</div>

</div>

<iframe
id="appFrame"
src="https://abuelatata.github.io/repeticiones-ceremonia-26/"
title="Pedidos Abuela Tata"
loading="eager">
</iframe>

<script>

(function () {

const frame = document.getElementById("appFrame");
const brandText = document.getElementById("brandText");

const params = new URLSearchParams(window.location.search);
const modo = (params.get("modo") || "").toLowerCase().trim();

const baseUrl = "https://abuelatata.github.io/repeticiones-ceremonia-26/";
const allowedModos = ["repeticiones","stock","excedentes"];

function buildIframeUrl(){

const url = new URL(baseUrl);

if(allowedModos.includes(modo)){
url.searchParams.set("modo",modo);
}

return url.toString();
}

function getBrandLabel(){

if(modo==="stock")
return "Stock disponible · Comunión 2026";

if(modo==="excedentes")
return "Excedentes · Comunión 2026";

if(modo==="repeticiones")
return "Repeticiones · Comunión 2026";

return "App de Pedidos · Comunión 2026";

}

frame.src = buildIframeUrl();

brandText.textContent = getBrandLabel();
document.title = getBrandLabel()+" · Abuela Tata";

})();

</script>

</body>
</html>
