  function injectCssIntoIframe() {
    let doc;

    try {
      doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
      if (!doc || !doc.head) return;
    } catch (err) {
      return;
    }

    let styleTag = doc.getElementById(injectedStyleId);
    if (!styleTag) {
      styleTag = doc.createElement("style");
      styleTag.id = injectedStyleId;
      doc.head.appendChild(styleTag);
    }

    styleTag.textContent = getInjectedCss();
  }

  function installIframeEnhancer() {
    frame.addEventListener("load", function () {
      injectCssIntoIframe();

      try {
        const doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (!doc || !doc.body) return;

        const observer = new MutationObserver(function () {
          injectCssIntoIframe();
        });

        observer.observe(doc.body, {
          childList: true,
          subtree: true
        });
      } catch (err) {
        /* sin acceso al iframe, no hacemos nada */
      }
    });
  }

  frame.src = buildIframeUrl();
  brandText.textContent = getBrandLabel();
  document.title = getBrandLabel() + " · Abuela Tata";
  installIframeEnhancer();
})();
